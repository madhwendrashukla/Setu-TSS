# ─── The Startup School — nginx configuration ────────────────────────────────
# Architecture: path-based reverse proxy on a single domain
#   /api/*  → Express backend  (port 5000)
#   /*      → Next.js frontend (port 3000)
#
# Prerequisites on the VPS:
#   1. Install nginx: sudo apt install nginx
#   2. Place this file at: /etc/nginx/sites-available/thestartupschool.in
#   3. Enable: sudo ln -s /etc/nginx/sites-available/thestartupschool.in \
#                        /etc/nginx/sites-enabled/
#   4. Test: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#   6. SSL: sudo certbot --nginx -d thestartupschool.in -d www.thestartupschool.in
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream targets ──────────────────────────────────────────────────────────
upstream tss_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream tss_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name thestartupschool.in www.thestartupschool.in;

    # Let's Encrypt challenge passthrough (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thestartupschool.in www.thestartupschool.in;

    # ── SSL (certbot fills these in — do NOT manually edit after certbot runs)
    # ssl_certificate     /etc/letsencrypt/live/thestartupschool.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/thestartupschool.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/x-javascript
        text/xml
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Client upload limit (for S3 multipart via admin panel) ────────────────
    client_max_body_size 20M;

    # ── API → Express backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://tss_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (generous for slow DB queries / S3 uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # Don't cache API responses
        proxy_cache_bypass    $http_upgrade;
        add_header            Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Next.js static assets (aggressive caching) ───────────────────────────
    location /_next/static/ {
        proxy_pass         http://tss_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── All other requests → Next.js frontend ────────────────────────────────
    location / {
        proxy_pass         http://tss_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
